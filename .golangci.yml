# golangci-lint configuration for prunejuice.
# Run with: golangci-lint run
run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - bodyclose

issues:
  exclude-rules:
    # Test files may skip a few checks for brevity.
    - path: _test\.go
      linters:
        - errcheck
